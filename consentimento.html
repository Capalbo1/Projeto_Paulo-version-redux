  <!-- CSS -->

  <link rel="stylesheet" href="assets/css/resultado.css?v=2">

<body>
<header class="site-header">
  <div class="nav">
    <a class="brand" href="index.html">
      <img src="assets/imagens/logo_disc.png" alt="DISC" class="brand-img">
    </a>

    <nav class="links">
      <a href="index.html#sobre">Sobre</a>
      <a href="index.html#professor">Desenvolvedor</a>
      <a href="index.html#politica">Política</a>
      <a class="button primary" href="consentimento.html">Começar</a>

      <div class="theme-switch">
        <span class="theme-label">Tema</span>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Alternar tema">🌗</button>
      </div>
    </nav>
  </div>
</header>

<main class="container">
  <section class="card">
    <h2>Consentimento (LGPD)</h2>
    <p>Seus dados serão usados apenas para fins de avaliação comportamental.
       Você pode solicitar exclusão a qualquer momento.</p>

    <!-- Formulário controlado via JS/localStorage -->
    <form id="form-consentimento" class="form">
      <div class="field">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
      </div>

      <div class="field">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="field">
        <label for="origem">Origem:</label>
        <select id="origem" name="origem" required>
          <option value="">Selecione</option>
          <option value="Fatec">Fatec</option>
          <option value="Instagram">Instagram</option>
          <option value="Indicacao">Indicação</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <div class="field" id="origem-outro-field" style="display:none;">
        <label for="origem_outro">Qual origem?</label>
        <input type="text" id="origem_outro" name="origem_outro">
</div>

      <div class="field agree">
        <input type="checkbox" id="agree" name="agree" required>
        <label for="agree">Declaro que li e concordo com os termos da LGPD</label>
      </div>

      <button class="button primary" type="submit">Concordo e iniciar</button>
      <a href="index.html" class="button primary">Voltar</a>
    </form>
  </section>
</main>

<footer class="site-footer">
  <div>
    <span>© CRV Soluções em T.I</span>

  </div>
</footer>

</body>
</html>
